version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  build-backend:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:9.0

    working_directory: ~/project/BankApi

    steps:
      - checkout

      - run:
          name: Fetch full git history for Sonar blame
          command: git fetch --unshallow || true

      - run:
          name: Install SonarScanner
          command: |
            dotnet tool install --global dotnet-sonarscanner
            echo 'export PATH="$PATH:/root/.dotnet/tools"' >> $BASH_ENV

      - run:
          name: Begin Sonar Analysis
          command: |
            dotnet sonarscanner begin \
              /k:"GMotlhamme_ClarityCapitalBankInc" \
              /o:"claritycapitalbank" \
              /d:sonar.host.url="https://sonarcloud.io" \
              /d:sonar.token="$SONAR_TOKEN"

      - run:
          name: Restore Backend
          command: dotnet restore

      - run:
          name: Build Backend
          command: dotnet build --configuration Release --no-restore

      - run:
          name: Run Backend Tests
          command: dotnet test --configuration Release --no-build

      - run:
          name: End Sonar Analysis
          command: |
            dotnet sonarscanner end \
              /d:sonar.token="$SONAR_TOKEN"

  build-frontend:
    executor: node/default

    working_directory: ~/project/frontend

    steps:
      - checkout:
          path: ~/project

      - node/install-packages:
          pkg-manager: npm

      - run:
          name: Build Frontend
          command: npm run build

workflows:
  version: 2

  build-and-analyze:
    jobs:
      - build-backend
      - build-frontend
